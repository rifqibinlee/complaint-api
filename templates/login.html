<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    body{background:var(--primary);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .wrap{width:100%;max-width:400px}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{width:60px;height:60px;background:var(--accent);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 24px rgba(29,111,164,.4)}
    .logo-icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .app-name{font-size:19px;font-weight:800;color:#fff;letter-spacing:3px;display:block}
    .app-tag{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px;display:block}
    .card{background:var(--surface);border-radius:20px;padding:28px 30px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    .card-title{font-size:20px;font-weight:700;color:var(--text1);margin-bottom:3px}
    .card-sub{font-size:12px;color:var(--text2);margin-bottom:24px}
    .field{margin-bottom:16px}
    .fl{display:block;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
    .ir{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:0 12px;transition:border-color .15s}
    .ir:focus-within{border-color:var(--accent)}
    .ir svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
    .ir input{flex:1;border:none;background:transparent;padding:11px 0;font-family:'Montserrat',sans-serif;font-size:14px;color:var(--text1);outline:none}
    .ir input::placeholder{color:var(--text3)}
    .eye{background:none;border:none;cursor:pointer;padding:3px;display:flex;align-items:center}
    .eye svg{width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .err{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B;padding:10px 13px;border-radius:var(--r-md);font-size:12px;margin-bottom:14px;display:none}
    .err.show{display:block}
    .sub-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-md);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .15s}
    .sub-btn:hover{opacity:.9}
    .sub-btn:disabled{opacity:.5;cursor:not-allowed}
    .sub-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .footer-link{text-align:center;margin-top:18px;font-size:13px;color:rgba(255,255,255,.5)}
    .footer-link a{color:#fff;font-weight:700;text-decoration:none;margin-left:5px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <span class="app-name">ADUAN AWAM</span>
    <span class="app-tag">Council Staff Portal</span>
  </div>
  <div class="card">
    <div class="card-title">Staff Login</div>
    <div class="card-sub">Sign in with your council credentials</div>
    <div class="err" id="err"></div>
    <div class="field">
      <label class="fl">Email Address</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" placeholder="staff@council.gov.my" autocomplete="email"/>
      </div>
    </div>
    <div class="field">
      <label class="fl">Password</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="eye" id="eye"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <button class="sub-btn" id="login-btn">
      <span id="lbl">Sign In</span>
      <svg viewBox="0 0 24 24" id="arr"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
  <div class="footer-link">Don't have an account?<a href="/dashboard/register">Register</a></div>
</div>
<script src="/static/js/app.js"></script>
<script>
  if (getToken()) window.location.href = '/dashboard';
  document.getElementById('eye').onclick = () => {
    const i = document.getElementById('password');
    i.type = i.type === 'password' ? 'text' : 'password';
  };
  document.getElementById('login-btn').onclick = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err      = document.getElementById('err');
    const btn      = document.getElementById('login-btn');
    err.classList.remove('show');
    if (!email || !password) { err.textContent='Email and password are required.'; err.classList.add('show'); return; }
    btn.disabled=true; document.getElementById('lbl').textContent='Signing in...'; document.getElementById('arr').style.display='none';
    const r = await apiFetch('/api/staff/login',{method:'POST',body:JSON.stringify({email,password})});
    if (!r.ok || r.data?.error) {
      err.textContent = r.data?.error ?? 'Login failed.'; err.classList.add('show');
      btn.disabled=false; document.getElementById('lbl').textContent='Sign In'; document.getElementById('arr').style.display='';
      return;
    }
    setAuth(r.data.token, r.data.staff);
    window.location.href='/dashboard';
  };
  document.addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('login-btn').click(); });
</script>
</body>
</html>
