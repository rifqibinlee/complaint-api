<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #map { width: 100%; height: calc(100vh - 64px); }

    .map-controls {
      position: absolute; top: 80px; right: 16px; z-index: 1000;
      display: flex; flex-direction: column; gap: 8px;
    }

    .map-filter-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      padding: 14px 16px;
      min-width: 200px;
    }

    .map-filter-title {
      font-size: 10px; font-weight: 700;
      color: var(--text3); letter-spacing: 1.2px;
      text-transform: uppercase; margin-bottom: 10px;
    }

    .filter-chip {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 10px; border-radius: 6px;
      cursor: pointer; transition: background 0.1s;
      font-size: 12px; font-weight: 600; color: var(--text2);
      margin-bottom: 4px;
    }

    .filter-chip:last-child { margin-bottom: 0; }
    .filter-chip:hover { background: var(--bg); }
    .filter-chip.active { background: var(--accent-light); color: var(--accent); }

    .filter-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .filter-chip-count { margin-left: auto; font-size: 11px; color: var(--text3); }

    .map-count-badge {
      background: var(--primary); color: white;
      padding: 8px 14px; border-radius: var(--radius-md);
      font-size: 12px; font-weight: 700;
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      border: 1px solid var(--border) !important;
    }

    .popup-cat  { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; margin-bottom: 5px; padding: 2px 8px; border-radius: 999px; display: inline-block; }
    .popup-title { font-size: 13px; font-weight: 700; color: #0F1F3D; margin-bottom: 3px; font-family: 'Montserrat', sans-serif; }
    .popup-desc  { font-size: 11px; color: #5A6A7E; line-height: 1.4; font-family: 'Montserrat', sans-serif; }
    .popup-date  { font-size: 10px; color: #9AA5B4; margin-top: 6px; font-family: 'Montserrat', sans-serif; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="sidebar-app-name">ADUAN AWAM</div>
        <div class="sidebar-tagline">Council Staff Portal</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a class="nav-item" data-page="dashboard" href="/dashboard">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview
        </a>
        <a class="nav-item" data-page="complaints" href="/dashboard/complaints">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Complaints
        </a>
        <a class="nav-item" data-page="map" href="/dashboard/map">
          <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Map View
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="staff-info">
          <div class="staff-avatar" id="staff-avatar">S</div>
          <div>
            <div class="staff-name" id="staff-name">Loading...</div>
            <div class="staff-role" id="staff-role"></div>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
        </button>
      </div>
    </aside>

    <div class="main" style="position:relative">
      <div class="topbar">
        <div>
          <div class="topbar-title">Visualisation</div>
          <div class="topbar-heading">Map View</div>
        </div>
        <div class="topbar-right">
          <div class="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
          <button class="btn btn-outline btn-sm" onclick="loadAndRender()">
            <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Refresh
          </button>
        </div>
      </div>

      <div id="map"></div>

      <div class="map-controls">
        <div class="map-count-badge" id="pin-count">Loading...</div>
        <div class="map-filter-card">
          <div class="map-filter-title">Filter by Category</div>
          <div id="filter-chips"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/app.js"></script>
  <script>
    if (!requireAuth()) {};
    renderStaffInfo();
    setActiveNav('map');

    const map = L.map('map').setView([3.139, 101.6869], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);

    let allMarkers = [];
    let allData    = [];
    let activeFilters = new Set();

    const CATEGORIES = [
      { id: 'infrastructure', label: 'Infrastructure' },
      { id: 'waste',          label: 'Waste & Cleanliness' },
      { id: 'water',          label: 'Water & Flooding' },
      { id: 'construction',   label: 'Construction' },
      { id: 'facilities',     label: 'Public Facilities' },
      { id: 'nuisance',       label: 'Nuisance & Community' },
      { id: 'health',         label: 'Public Health' },
    ];

    async function loadAndRender() {
      document.getElementById('pin-count').textContent = 'Loading...';
      const data = await api('/api/complaints?limit=500');
      if (!data) return;

      allData = data.filter(c => c.lat && c.lng);

      // Build filter chips
      const chips = document.getElementById('filter-chips');
      chips.innerHTML = CATEGORIES.map(cat => {
        const count = allData.filter(c => c.category_id === cat.id).length;
        return `
          <div class="filter-chip active" data-cat="${cat.id}" onclick="toggleFilter('${cat.id}')">
            <span class="filter-chip-dot" style="background:${catColor(cat.id)}"></span>
            ${cat.label}
            <span class="filter-chip-count">${count}</span>
          </div>`;
      }).join('');

      CATEGORIES.forEach(c => activeFilters.add(c.id));
      renderMarkers();
    }

    function toggleFilter(catId) {
      if (activeFilters.has(catId)) activeFilters.delete(catId);
      else activeFilters.add(catId);

      document.querySelectorAll('.filter-chip').forEach(el => {
        el.classList.toggle('active', activeFilters.has(el.dataset.cat));
      });

      renderMarkers();
    }

    function renderMarkers() {
      allMarkers.forEach(m => map.removeLayer(m));
      allMarkers = [];

      const visible = allData.filter(c => activeFilters.has(c.category_id));

      visible.forEach(c => {
        const color = catColor(c.category_id);
        const pin   = `
          <div style="position:relative;width:28px;height:36px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))">
            <div style="width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${color};border:2px solid rgba(255,255,255,0.9);position:absolute;top:0;left:0"></div>
            <div style="width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.85);position:absolute;top:9px;left:9px"></div>
          </div>`;

        const marker = L.marker([parseFloat(c.lat), parseFloat(c.lng)], {
          icon: L.divIcon({ html: pin, className: '', iconSize: [28,36], iconAnchor: [14,36], popupAnchor: [0,-36] })
        });

        marker.bindPopup(`
          <div style="font-family:'Montserrat',sans-serif;min-width:180px;padding:4px 2px">
            <span class="popup-cat" style="background:${color}18;color:${color}">${c.subcategory}</span>
            <div class="popup-title">${c.title}</div>
            <div class="popup-desc">${c.description}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
              <span class="popup-date">${fmtDate(c.submitted_at)}</span>
              <a href="/dashboard/complaints?id=${c.id}" style="font-size:11px;font-weight:700;color:${color};text-decoration:none">View →</a>
            </div>
          </div>
        `, { maxWidth: 240 });

        marker.addTo(map);
        allMarkers.push(marker);
      });

      document.getElementById('pin-count').textContent =
        `${visible.length} pin${visible.length !== 1 ? 's' : ''} on map`;
    }

    loadAndRender();
  </script>
</body>
</html>
