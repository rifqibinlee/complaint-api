<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    body {
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }

    .login-wrap { width: 100%; max-width: 420px; }

    .login-logo {
      text-align: center; margin-bottom: 36px;
    }

    .login-logo-icon {
      width: 64px; height: 64px;
      background: var(--accent); border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(29,111,164,0.4);
    }

    .login-logo-icon svg {
      width: 30px; height: 30px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .login-app-name {
      font-size: 20px; font-weight: 800;
      color: white; letter-spacing: 3px;
      display: block;
    }

    .login-tagline {
      font-size: 11px; color: rgba(255,255,255,0.4);
      margin-top: 5px; letter-spacing: 0.5px;
      display: block;
    }

    .login-card {
      background: var(--surface);
      border-radius: 20px; padding: 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .login-title { font-size: 22px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

    .field        { margin-bottom: 18px; }
    .field-label  { font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: 1.2px; text-transform: uppercase; display: block; margin-bottom: 8px; }

    .input-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 0 12px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    .input-row svg {
      width: 17px; height: 17px;
      stroke: var(--text3); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .input-row input {
      flex: 1; border: none; background: transparent;
      padding: 12px 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px; color: var(--text1); outline: none;
    }

    .input-row input::placeholder { color: var(--text3); }

    .eye-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center;
    }

    .eye-btn svg {
      width: 16px; height: 16px;
      stroke: var(--text3); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .error-box {
      background: #FEE2E2; border: 1px solid #FECACA;
      color: #991B1B; padding: 11px 14px;
      border-radius: var(--radius-md);
      font-size: 13px; margin-bottom: 18px;
      display: none;
    }

    .error-box.show { display: block; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: var(--primary); color: white;
      border: none; border-radius: var(--radius-md);
      font-family: 'Montserrat', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.15s;
    }

    .submit-btn:hover    { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .submit-btn svg {
      width: 16px; height: 16px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .spinner-sm {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="login-app-name">ADUAN AWAM</span>
      <span class="login-tagline">Council Staff Portal</span>
    </div>

    <div class="login-card">
      <div class="login-title">Staff Login</div>
      <div class="login-sub">Sign in with your council credentials</div>

      <div class="error-box" id="err"></div>

      <div class="field">
        <label class="field-label">Email Address</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="staff@council.gov.my" autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          <button class="eye-btn" id="eye-btn" type="button">
            <svg viewBox="0 0 24 24" id="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="submit-btn" id="login-btn">
        <span id="btn-label">Sign In</span>
        <svg viewBox="0 0 24 24" id="btn-arrow"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>

<script src="/static/js/app.js"></script>
<script>
  if (!requireAuth()) { throw new Error('redirecting'); }
  renderStaffInfo();
  setActiveNav('dashboard');

  const TOKEN = getToken();

  async function safeFetch(path) {
    try {
      const res = await fetch(path, {
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      if (!res.ok) {
        console.warn(path, 'returned', res.status);
        return null;
      }
      return await res.json();
    } catch (e) {
      console.error(path, e);
      return null;
    }
  }

  async function loadAll() {
    const [stats, complaints] = await Promise.all([
      safeFetch('/api/stats'),
      safeFetch('/api/complaints?limit=10'),
    ]);
    if (stats)      renderStats(stats);
    if (complaints) renderRecent(complaints);
  }

  function renderStats(s) {
    document.getElementById('stat-total').textContent    = s.total ?? 0;
    document.getElementById('stat-open').textContent     = s.open ?? 0;
    document.getElementById('stat-progress').textContent = s.in_progress ?? 0;
    document.getElementById('stat-resolved').textContent = s.resolved ?? 0;
    document.getElementById('stat-today').textContent    = `${s.today ?? 0} submitted today`;
    document.getElementById('avg-hours').textContent     = s.avg_resolution_hours ?? '—';

    const max = Math.max(...(s.by_category ?? []).map(c => c.count), 1);
    document.getElementById('cat-list').innerHTML = (s.by_category ?? []).map(c => `
      <div class="category-row">
        <span class="cat-dot" style="background:${catColor(c.category_id)}"></span>
        <span class="cat-name">${catLabel(c.category_id)}</span>
        <div class="cat-bar-wrap">
          <div class="cat-bar" style="width:${Math.round(c.count/max*100)}%;background:${catColor(c.category_id)}"></div>
        </div>
        <span class="cat-count">${c.count}</span>
      </div>
    `).join('') || '<div class="empty"><div class="empty-title">No data yet</div></div>';
  }

  function renderRecent(complaints) {
    document.getElementById('recent-list').innerHTML = complaints.length === 0
      ? '<div class="empty" style="padding:30px 0"><div class="empty-title">No complaints yet</div></div>'
      : complaints.map(c => `
        <div class="recent-row" onclick="window.location.href='/dashboard/complaints?id=${c.id}'">
          <span class="recent-dot" style="background:${catColor(c.category_id)}"></span>
          <div class="recent-body">
            <div class="recent-title">${c.title}</div>
            <div class="recent-meta">${catLabel(c.category_id)} &middot; ${fmtDate(c.submitted_at)}</div>
          </div>
          ${statusPill(c.status)}
        </div>
      `).join('');
  }

  loadAll();
</script>
</body>
</html>
