<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Complaints — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
<div class="layout">
<aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="21" height="21">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="logo-name">ADUAN AWAM</div>
      <div class="logo-tag">Council Staff Portal</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Main</div>
      <a class="nav-link" data-page="dashboard" href="/dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Overview
      </a>
      <a class="nav-link" data-page="complaints" href="/dashboard/complaints">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Complaints
      </a>
      <a class="nav-link" data-page="map" href="/dashboard/map">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
        Map View
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="staff-card">
        <div class="staff-av" id="staff-av">S</div>
        <div>
          <div class="staff-name" id="staff-name">—</div>
          <div class="staff-role" id="staff-role">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left"><div class="page-label">Management</div><div class="page-title">Complaints</div></div>
      <div class="topbar-right">
        <div class="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
        <button class="btn btn-outline btn-sm" onclick="load()"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Refresh</button>
      </div>
    </div>
    <div class="page-body">
      <div class="card">
        <div class="filter-bar">
          <div class="search-box">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="q" placeholder="Search title or description..." oninput="filter()"/>
          </div>
          <select class="input" style="width:140px" id="fs" onchange="filter()">
            <option value="">All Status</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
          <select class="input" style="width:170px" id="fc" onchange="filter()">
            <option value="">All Categories</option>
            <option value="infrastructure">Infrastructure</option>
            <option value="waste">Waste & Cleanliness</option>
            <option value="water">Water & Flooding</option>
            <option value="construction">Construction</option>
            <option value="facilities">Public Facilities</option>
            <option value="nuisance">Nuisance & Community</option>
            <option value="health">Public Health</option>
            <option value="council">Council Complaint</option>
            <option value="financial">Financial & Policy</option>
          </select>
        </div>
        <div class="table-wrap" id="tbl"><div class="loading"><div class="spinner"></div>Loading...</div></div>
        <div style="padding:10px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)" id="count"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="m-title">Complaint Details</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer">
      <select class="input" style="width:160px" id="m-status">
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
      <button class="btn btn-primary" onclick="updateStatus()">Update Status</button>
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
  if (!requireAuth()) { throw 0; }
  renderStaffInfo();
  setActiveNav('complaints');
  const TOK = getToken();
  let all = [], curId = null;

  async function load() {
    document.getElementById('tbl').innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
    try {
      const res = await fetch('/api/complaints?limit=500',{headers:{Authorization:`Bearer ${TOK}`}});
      all = res.ok ? await res.json() : [];
    } catch { all = []; }
    filter();
  }

  function filter() {
    const q   = document.getElementById('q').value.toLowerCase();
    const st  = document.getElementById('fs').value;
    const cat = document.getElementById('fc').value;
    const vis = all.filter(c => {
      if (st  && c.status !== st)           return false;
      if (cat && c.category_id !== cat)     return false;
      if (q   && !c.title.toLowerCase().includes(q)
              && !c.description.toLowerCase().includes(q)) return false;
      return true;
    });
    renderTable(vis);
  }

  function renderTable(rows) {
    document.getElementById('count').textContent = `${rows.length} complaint${rows.length!==1?'s':''}`;
    if (!rows.length) {
      document.getElementById('tbl').innerHTML =
        '<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="empty-title">No complaints found</div><div class="empty-sub">Try adjusting filters</div></div>';
      return;
    }
    document.getElementById('tbl').innerHTML = `
      <table>
        <thead><tr>
          <th>#</th><th>Title</th><th>Category</th>
          <th>Status</th><th>Submitted By</th><th>Date</th><th>Location</th>
        </tr></thead>
        <tbody>${rows.map(c=>`
          <tr style="cursor:pointer" onclick="openModal(${c.id})">
            <td style="font-size:11px;color:var(--text3);font-weight:700">#${c.id}</td>
            <td><div class="td-title">${c.title}</div><div class="td-sub">${c.subcategory}</div></td>
            <td><span style="display:inline-flex;align-items:center;gap:6px"><span class="cat-dot" style="background:${catColor(c.category_id)}"></span><span style="font-size:12px;font-weight:600">${catLabel(c.category_id)}</span></span></td>
            <td>${statusPill(c.status)}</td>
            <td style="font-size:12px">${c.submitted_by??'—'}</td>
            <td style="font-size:12px;color:var(--text2);white-space:nowrap">${fmtDate(c.submitted_at)}</td>
            <td style="font-size:11px;color:var(--text3)">${c.lat?`${parseFloat(c.lat).toFixed(3)}, ${parseFloat(c.lng).toFixed(3)}`:'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function openModal(id) {
    const c = all.find(x=>x.id===id);
    if (!c) return;
    curId = id;
    document.getElementById('m-title').textContent = c.title;
    document.getElementById('m-status').value = c.status;
    document.getElementById('m-body').innerHTML = `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        ${statusPill(c.status)}
        <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;background:${catColor(c.category_id)}18;color:${catColor(c.category_id)}">
          <span style="width:6px;height:6px;border-radius:50%;background:${catColor(c.category_id)};display:inline-block"></span>
          ${c.subcategory}
        </span>
      </div>
      ${c.image_url?`<img src="${c.image_url}" style="width:100%;border-radius:var(--r-md);margin-bottom:16px" onerror="this.style.display='none'">`:''}
      <div class="detail-row">
        <div class="detail-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div><div class="detail-label">Description</div><div class="detail-value">${c.description}</div></div>
      </div>
      <div class="detail-row">
        <div class="detail-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div><div class="detail-label">Submitted By</div><div class="detail-value">${c.submitted_by??'—'}</div></div>
      </div>
      <div class="detail-row">
        <div class="detail-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div><div class="detail-label">Submitted</div><div class="detail-value">${fmtDT(c.submitted_at)}</div></div>
      </div>
      ${c.lat?`<div class="detail-row">
        <div class="detail-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <div><div class="detail-label">Location</div><div class="detail-value">${parseFloat(c.lat).toFixed(5)}, ${parseFloat(c.lng).toFixed(5)}</div></div>
      </div>`:''}`;
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    curId = null;
  }

  async function updateStatus() {
    if (!curId) return;
    const status = document.getElementById('m-status').value;
    const r = await apiFetch(`/api/complaints/${curId}/status`,{method:'PATCH',body:JSON.stringify({status})});
    if (r.ok) {
      const idx = all.findIndex(c=>c.id===curId);
      if (idx!==-1) all[idx].status = status;
      filter(); closeModal();
      showToast('Status updated successfully');
    } else { showToast(r.data?.error??'Update failed','error'); }
  }

  const urlId = new URLSearchParams(location.search).get('id');
  load().then(()=>{ if (urlId) openModal(parseInt(urlId)); });
</script>
</body>
</html>
