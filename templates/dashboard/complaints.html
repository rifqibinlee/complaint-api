<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaints — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    .detail-row { display: flex; gap: 12px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .detail-row:last-child { border-bottom: none; }
    .detail-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .detail-icon svg { width: 16px; height: 16px; stroke: var(--accent); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .detail-label { font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
    .detail-value { font-size: 14px; color: var(--text1); line-height: 1.5; }
    .complaint-image { width: 100%; border-radius: var(--radius-md); margin-top: 16px; }
    .status-select {
      padding: 8px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; font-weight: 600;
      color: var(--text1); outline: none; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="sidebar-app-name">ADUAN AWAM</div>
        <div class="sidebar-tagline">Council Staff Portal</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a class="nav-item" data-page="dashboard" href="/dashboard">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview
        </a>
        <a class="nav-item" data-page="complaints" href="/dashboard/complaints">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Complaints
        </a>
        <a class="nav-item" data-page="map" href="/dashboard/map">
          <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Map View
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="staff-info">
          <div class="staff-avatar" id="staff-avatar">S</div>
          <div>
            <div class="staff-name" id="staff-name">Loading...</div>
            <div class="staff-role" id="staff-role"></div>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
        </button>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div>
          <div class="topbar-title">Management</div>
          <div class="topbar-heading">Complaints</div>
        </div>
        <div class="topbar-right">
          <div class="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
        </div>
      </div>

      <div class="page-body">
        <div class="card">
          <!-- Filter bar -->
          <div class="filter-bar">
            <div class="search-wrap">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="search" placeholder="Search complaints..." oninput="applyFilters()" />
            </div>
            <select class="input" style="width:140px" id="filter-status" onchange="applyFilters()">
              <option value="">All Status</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
            <select class="input" style="width:180px" id="filter-cat" onchange="applyFilters()">
              <option value="">All Categories</option>
              <option value="infrastructure">Infrastructure</option>
              <option value="waste">Waste & Cleanliness</option>
              <option value="water">Water & Flooding</option>
              <option value="construction">Construction</option>
              <option value="facilities">Public Facilities</option>
              <option value="nuisance">Nuisance & Community</option>
              <option value="health">Public Health</option>
              <option value="council">Council Complaint</option>
              <option value="financial">Financial & Policy</option>
            </select>
            <button class="btn btn-outline btn-sm" onclick="loadComplaints()">
              <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              Refresh
            </button>
          </div>

          <!-- Table -->
          <div class="table-wrap" id="table-wrap">
            <div class="loading"><div class="spinner"></div> Loading complaints...</div>
          </div>

          <!-- Pagination -->
          <div class="pagination" id="pagination" style="display:none">
            <span id="page-info"></span>
            <div class="page-btns" id="page-btns"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Complaint Details</div>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <select class="status-select" id="modal-status-select">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
        <button class="btn btn-primary" onclick="updateStatus()">Update Status</button>
        <button class="btn btn-outline" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/static/js/app.js"></script>
  <script>
    if (!requireAuth()) {};
    renderStaffInfo();
    setActiveNav('complaints');

    let allComplaints = [];
    let currentId     = null;

    async function loadComplaints() {
      document.getElementById('table-wrap').innerHTML =
        '<div class="loading"><div class="spinner"></div> Loading complaints...</div>';
      const data = await api('/api/complaints?limit=500');
      if (!data) return;
      allComplaints = data;
      applyFilters();
    }

    function applyFilters() {
      const q      = document.getElementById('search').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      const cat    = document.getElementById('filter-cat').value;

      const filtered = allComplaints.filter(c => {
        if (status && c.status !== status)           return false;
        if (cat    && c.category_id !== cat)         return false;
        if (q && !c.title.toLowerCase().includes(q)
              && !c.description.toLowerCase().includes(q)
              && !(c.submitted_by ?? '').toLowerCase().includes(q)) return false;
        return true;
      });

      renderTable(filtered);
    }

    function renderTable(complaints) {
      if (complaints.length === 0) {
        document.getElementById('table-wrap').innerHTML = `
          <div class="empty">
            <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            <div class="empty-title">No complaints found</div>
            <div class="empty-sub">Try adjusting your filters</div>
          </div>`;
        document.getElementById('pagination').style.display = 'none';
        return;
      }

      document.getElementById('table-wrap').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Category</th>
              <th>Status</th>
              <th>Submitted By</th>
              <th>Date</th>
              <th>Location</th>
            </tr>
          </thead>
          <tbody>
            ${complaints.map(c => `
              <tr style="cursor:pointer" onclick="openModal(${c.id})">
                <td style="font-size:11px;color:var(--text3);font-weight:700">#${c.id}</td>
                <td>
                  <div class="td-title">${c.title}</div>
                  <div class="td-sub">${c.subcategory}</div>
                </td>
                <td>
                  <div style="display:flex;align-items:center;gap:7px">
                    <span class="cat-dot" style="background:${catColor(c.category_id)}"></span>
                    <span style="font-size:12px;font-weight:600">${catLabel(c.category_id)}</span>
                  </div>
                </td>
                <td>${statusPill(c.status)}</td>
                <td style="font-size:12px">${c.submitted_by ?? '—'}</td>
                <td class="td-date">${fmtDate(c.submitted_at)}</td>
                <td style="font-size:12px;color:var(--text3)">
                  ${c.lat ? `${parseFloat(c.lat).toFixed(3)}, ${parseFloat(c.lng).toFixed(3)}` : '—'}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;

      const pg = document.getElementById('pagination');
      pg.style.display = 'flex';
      document.getElementById('page-info').textContent = `${complaints.length} complaint${complaints.length !== 1 ? 's' : ''}`;
      document.getElementById('page-btns').innerHTML = '';
    }

    function openModal(id) {
      const c = allComplaints.find(x => x.id === id);
      if (!c) return;
      currentId = id;

      document.getElementById('modal-title').textContent = c.title;
      document.getElementById('modal-status-select').value = c.status;

      document.getElementById('modal-body').innerHTML = `
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <span class="pill ${c.status}"><span class="pill-dot"></span>${c.status.replace('_',' ')}</span>
          <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:${catColor(c.category_id)}20;color:${catColor(c.category_id)}">
            <span style="width:6px;height:6px;border-radius:50%;background:${catColor(c.category_id)};display:inline-block"></span>
            ${c.subcategory}
          </span>
        </div>

        ${c.image_url ? `<img src="${c.image_url}" class="complaint-image" alt="Complaint photo" onerror="this.style.display='none'">` : ''}

        <div class="detail-row">
          <div class="detail-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <div><div class="detail-label">Description</div><div class="detail-value">${c.description}</div></div>
        </div>
        <div class="detail-row">
          <div class="detail-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <div><div class="detail-label">Submitted By</div><div class="detail-value">${c.submitted_by ?? '—'}</div></div>
        </div>
        <div class="detail-row">
          <div class="detail-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
          <div><div class="detail-label">Submitted</div><div class="detail-value">${fmtDateTime(c.submitted_at)}</div></div>
        </div>
        ${c.lat ? `
        <div class="detail-row">
          <div class="detail-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
          <div><div class="detail-label">Location</div><div class="detail-value">${parseFloat(c.lat).toFixed(5)}, ${parseFloat(c.lng).toFixed(5)}</div></div>
        </div>` : ''}
      `;

      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      currentId = null;
    }

    async function updateStatus() {
      if (!currentId) return;
      const status = document.getElementById('modal-status-select').value;
      const data   = await api(`/api/complaints/${currentId}/status`, {
        method: 'PATCH',
        body:   JSON.stringify({ status }),
      });
      if (data && !data.error) {
        const idx = allComplaints.findIndex(c => c.id === currentId);
        if (idx !== -1) allComplaints[idx].status = status;
        applyFilters();
        closeModal();
        showToast('Status updated successfully');
      } else {
        showToast(data?.error ?? 'Update failed', 'x');
      }
    }

    // Open specific complaint from URL param
    const urlId = new URLSearchParams(location.search).get('id');
    if (urlId) loadComplaints().then(() => openModal(parseInt(urlId)));
    else loadComplaints();
  </script>
</body>
</html>
