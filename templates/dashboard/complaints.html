<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Complaints — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-name">ADUAN AWAM</div>
      <div class="logo-tag">Council Staff Portal</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Main</div>
      <a class="nav-link" data-page="dashboard"   href="/dashboard">Overview</a>
      <a class="nav-link" data-page="complaints"  href="/dashboard/complaints">Complaints</a>
      <a class="nav-link" data-page="map"         href="/dashboard/map">Map View</a>
    </nav>
    <div class="sidebar-footer">
      <div class="staff-card">
        <div class="staff-av" id="staff-av">S</div>
        <div>
          <div class="staff-name" id="staff-name">—</div>
          <div class="staff-role" id="staff-role">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-label">Management</div>
        <div class="page-title">Complaints</div>
      </div>
      <div class="topbar-right">
        <div class="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
        <button class="btn btn-outline btn-sm" onclick="load()">Refresh</button>
      </div>
    </div>

    <div class="page-body">
      <div class="card">

        <!-- Filters -->
        <div class="filter-bar">
          <div class="search-box">
            <input type="text" id="q" placeholder="Search title or description..." oninput="filter()"/>
          </div>
          <select class="input" style="width:150px" id="fs" onchange="filter()">
            <option value="">All Status</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
          <select class="input" style="width:180px" id="fc" onchange="filter()">
            <option value="">All Categories</option>
            <option value="infrastructure">Infrastructure</option>
            <option value="waste">Waste & Cleanliness</option>
            <option value="water">Water & Flooding</option>
            <option value="construction">Construction</option>
            <option value="facilities">Public Facilities</option>
            <option value="nuisance">Nuisance & Community</option>
            <option value="health">Public Health</option>
            <option value="council">Council Complaint</option>
            <option value="financial">Financial & Policy</option>
          </select>
        </div>

        <!-- Table -->
        <div class="table-wrap" id="tbl">
          <div class="loading"><div class="spinner"></div> Loading complaints...</div>
        </div>

        <!-- Count -->
        <div style="padding:10px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)" id="count"></div>

      </div>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="m-title">Complaint Details</div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-footer">
      <select class="input" style="width:160px" id="m-status">
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
      </select>
      <button class="btn btn-primary" onclick="updateStatus()">Update Status</button>
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
  if (!requireAuth()) { throw 0; }
  renderStaffInfo();
  setActiveNav('complaints');
  const TOK = getToken();
  let all = [], curId = null;

  async function load() {
    document.getElementById('tbl').innerHTML =
      '<div class="loading"><div class="spinner"></div> Loading complaints...</div>';
    try {
      const res = await fetch('/api/complaints?limit=500', {
        headers: { Authorization: `Bearer ${TOK}` }
      });
      all = res.ok ? await res.json() : [];
    } catch { all = []; }
    filter();
  }

  function filter() {
    const q   = document.getElementById('q').value.toLowerCase();
    const st  = document.getElementById('fs').value;
    const cat = document.getElementById('fc').value;
    const vis = all.filter(c => {
      if (st  && c.status      !== st)  return false;
      if (cat && c.category_id !== cat) return false;
      if (q && !c.title.toLowerCase().includes(q)
            && !(c.description||'').toLowerCase().includes(q)) return false;
      return true;
    });
    renderTable(vis);
  }

  function renderTable(rows) {
    document.getElementById('count').textContent =
      `${rows.length} complaint${rows.length !== 1 ? 's' : ''}`;

    if (!rows.length) {
      document.getElementById('tbl').innerHTML = `
        <div class="empty">
          <div class="empty-title">No complaints found</div>
          <div class="empty-sub">Try adjusting your filters</div>
        </div>`;
      return;
    }

    document.getElementById('tbl').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Category</th>
            <th>Status</th>
            <th>Submitted By</th>
            <th>Date</th>
            <th>Location</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(c => `
            <tr style="cursor:pointer" onclick="openModal(${c.id})">
              <td style="font-size:11px;color:var(--text3);font-weight:700">#${c.id}</td>
              <td>
                <div class="td-title">${c.title}</div>
                <div class="td-sub">${c.subcategory}</div>
              </td>
              <td>
                <span style="display:inline-flex;align-items:center;gap:6px">
                  <span class="cat-dot" style="background:${catColor(c.category_id)}"></span>
                  <span style="font-size:12px;font-weight:600">${catLabel(c.category_id)}</span>
                </span>
              </td>
              <td>${statusPill(c.status)}</td>
              <td style="font-size:12px">${c.submitted_by ?? '—'}</td>
              <td style="font-size:12px;color:var(--text2);white-space:nowrap">${fmtDate(c.submitted_at)}</td>
              <td style="font-size:11px;color:var(--text3)">
                ${c.lat ? `${parseFloat(c.lat).toFixed(3)}, ${parseFloat(c.lng).toFixed(3)}` : '—'}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  function openModal(id) {
    const c = all.find(x => x.id === id);
    if (!c) return;
    curId = id;
    document.getElementById('m-title').textContent = c.title;
    document.getElementById('m-status').value = c.status;
    document.getElementById('m-body').innerHTML = `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        ${statusPill(c.status)}
        <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;
          border-radius:999px;font-size:11px;font-weight:700;
          background:${catColor(c.category_id)}18;color:${catColor(c.category_id)}">
          <span style="width:6px;height:6px;border-radius:50%;
            background:${catColor(c.category_id)};display:inline-block"></span>
          ${c.subcategory}
        </span>
      </div>
      ${c.image_url
        ? `<img src="${c.image_url}" style="width:100%;border-radius:var(--radius-md);
             margin-bottom:16px;max-height:280px;object-fit:cover"
             onerror="this.style.display='none'">`
        : ''}
      <div class="detail-row">
        <div class="detail-icon">&#128196;</div>
        <div>
          <div class="detail-label">Description</div>
          <div class="detail-value">${c.description}</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">&#128100;</div>
        <div>
          <div class="detail-label">Submitted By</div>
          <div class="detail-value">${c.submitted_by ?? '—'}</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">&#128197;</div>
        <div>
          <div class="detail-label">Date Submitted</div>
          <div class="detail-value">${fmtDT(c.submitted_at)}</div>
        </div>
      </div>
      ${c.lat ? `
      <div class="detail-row">
        <div class="detail-icon">&#128205;</div>
        <div>
          <div class="detail-label">Location</div>
          <div class="detail-value">${parseFloat(c.lat).toFixed(5)}, ${parseFloat(c.lng).toFixed(5)}</div>
        </div>
      </div>` : ''}`;
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    curId = null;
  }

  async function updateStatus() {
    if (!curId) return;
    const status = document.getElementById('m-status').value;
    const r = await apiFetch(`/api/complaints/${curId}/status`, {
      method: 'PATCH',
      body: JSON.stringify({ status }),
    });
    if (r.ok) {
      const idx = all.findIndex(c => c.id === curId);
      if (idx !== -1) all[idx].status = status;
      filter();
      closeModal();
      showToast('Status updated successfully');
    } else {
      showToast(r.data?.error ?? 'Update failed', 'error');
    }
  }

  const urlId = new URLSearchParams(location.search).get('id');
  load().then(() => { if (urlId) openModal(parseInt(urlId)); });
</script>
</body>
</html>
