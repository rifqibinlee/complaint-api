<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    body{background:var(--primary);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .wrap{width:100%;max-width:460px}
    .back{display:inline-flex;align-items:center;gap:7px;color:rgba(255,255,255,.55);text-decoration:none;font-size:12px;font-weight:600;margin-bottom:20px;transition:color .15s}
    .back:hover{color:#fff}
    .back svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .logo{text-align:center;margin-bottom:24px}
    .logo-icon{width:52px;height:52px;background:var(--accent);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px;box-shadow:0 8px 24px rgba(29,111,164,.4)}
    .logo-icon svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .app-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:3px;display:block}
    .app-tag{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;display:block}
    .card{background:var(--surface);border-radius:20px;padding:26px 28px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    .card-title{font-size:19px;font-weight:700;color:var(--text1);margin-bottom:3px}
    .card-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
    .sec{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin:18px 0 12px}
    .divider{height:1px;background:var(--border);margin:18px 0}
    .field{margin-bottom:12px}
    .fl{display:block;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
    .ir{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:0 12px;transition:border-color .15s}
    .ir:focus-within{border-color:var(--accent)}
    .ir svg{width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
    .ir input,.ir select{flex:1;border:none;background:transparent;padding:10px 0;font-family:'Montserrat',sans-serif;font-size:13px;color:var(--text1);outline:none;appearance:none}
    .ir input::placeholder{color:var(--text3)}
    .eye{background:none;border:none;cursor:pointer;padding:3px;display:flex;align-items:center}
    .eye svg{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .info-box{background:var(--accent-light);border:1px solid rgba(29,111,164,.2);border-radius:var(--r-md);padding:11px 13px;display:flex;gap:9px;margin-bottom:14px}
    .info-box svg{width:15px;height:15px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:1px}
    .info-box span{font-size:11px;color:var(--accent);font-weight:500;line-height:1.5}
    .err{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B;padding:10px 13px;border-radius:var(--r-md);font-size:12px;margin-bottom:14px;display:none}
    .err.show{display:block}
    .sub-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-md);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .15s}
    .sub-btn:hover{opacity:.9}
    .sub-btn:disabled{opacity:.5;cursor:not-allowed}
    .sub-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/dashboard/login">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Login
  </a>
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
    <span class="app-name">ADUAN AWAM</span>
    <span class="app-tag">Staff Registration</span>
  </div>
  <div class="card">
    <div class="card-title">Create Staff Account</div>
    <div class="card-sub">You need a valid invite code from your administrator</div>
    <div class="err" id="err"></div>
    <div class="info-box">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Authorised council staff only. Contact your administrator for the invite code.</span>
    </div>
    <div class="sec">Personal Details</div>
    <div class="field">
      <label class="fl">Full Name</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="full_name" placeholder="As per official records" autocomplete="name"/>
      </div>
    </div>
    <div class="field">
      <label class="fl">Email Address</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" placeholder="staff@council.gov.my" autocomplete="email"/>
      </div>
    </div>
    <div class="field">
      <label class="fl">Phone Number</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1 19.79 19.79 0 0 1 1.62 4.43 2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input type="tel" id="phone" placeholder="0123456789" autocomplete="tel"/>
      </div>
    </div>
    <div class="field">
      <label class="fl">Department</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <select id="department"><option value="">Loading...</option></select>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sec">Account Security</div>
    <div class="field">
      <label class="fl">Password</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password"/>
        <button class="eye" id="eye"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <div class="field">
      <label class="fl">Confirm Password</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password"/>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sec">Invite Code</div>
    <div class="field">
      <label class="fl">Council Invite Code</label>
      <div class="ir">
        <svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        <input type="text" id="invite_code" placeholder="Enter invite code" autocomplete="off"/>
      </div>
    </div>
    <button class="sub-btn" id="reg-btn">
      <span id="lbl">Create Account</span>
      <svg viewBox="0 0 24 24" id="arr"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
</div>
<script src="/static/js/app.js"></script>
<script>
  if (getToken()) window.location.href = '/dashboard';

  // Load departments without auth
  fetch('/api/departments').then(r=>r.json()).then(data=>{
    const sel = document.getElementById('department');
    sel.innerHTML = '<option value="">Select department</option>' +
      data.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
  }).catch(()=>{
    document.getElementById('department').innerHTML='<option value="">Failed to load</option>';
  });

  document.getElementById('eye').onclick = () => {
    const i = document.getElementById('password');
    i.type = i.type === 'password' ? 'text' : 'password';
  };

  document.getElementById('reg-btn').onclick = async () => {
    const full_name   = document.getElementById('full_name').value.trim();
    const email       = document.getElementById('email').value.trim();
    const phone       = document.getElementById('phone').value.trim();
    const dept        = document.getElementById('department').value;
    const password    = document.getElementById('password').value;
    const confirm     = document.getElementById('confirm').value;
    const invite_code = document.getElementById('invite_code').value.trim();
    const err         = document.getElementById('err');
    const btn         = document.getElementById('reg-btn');
    err.classList.remove('show');
    if (!full_name||!email||!dept||!password||!invite_code){err.textContent='Please fill in all required fields.';err.classList.add('show');return}
    if (password.length<8){err.textContent='Password must be at least 8 characters.';err.classList.add('show');return}
    if (password!==confirm){err.textContent='Passwords do not match.';err.classList.add('show');return}
    btn.disabled=true;document.getElementById('lbl').textContent='Creating...';document.getElementById('arr').style.display='none';
    const r = await apiFetch('/api/staff/register',{
      method:'POST',
      body:JSON.stringify({full_name,email,phone,department_id:parseInt(dept),password,invite_code})
    });
    if (!r.ok||r.data?.error){
      err.textContent=r.data?.error??'Registration failed.';err.classList.add('show');
      btn.disabled=false;document.getElementById('lbl').textContent='Create Account';document.getElementById('arr').style.display='';
      return;
    }
    setAuth(r.data.token,r.data.staff);
    window.location.href='/dashboard';
  };
</script>
</body>
</html>
