<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Registration — Aduan Awam</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <style>
    body {
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }

    .register-wrap { width: 100%; max-width: 480px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 13px; font-weight: 600;
      margin-bottom: 24px;
      transition: color 0.15s;
    }

    .back-link:hover { color: white; }

    .back-link svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .register-logo {
      text-align: center; margin-bottom: 28px;
    }

    .register-logo-icon {
      width: 56px; height: 56px;
      background: var(--accent); border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(29,111,164,0.4);
    }

    .register-logo-icon svg {
      width: 26px; height: 26px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .register-app-name {
      font-size: 18px; font-weight: 800;
      color: white; letter-spacing: 3px; display: block;
    }

    .register-tagline {
      font-size: 11px; color: rgba(255,255,255,0.4);
      margin-top: 4px; display: block;
    }

    .register-card {
      background: var(--surface);
      border-radius: 20px; padding: 28px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .register-title { font-size: 20px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
    .register-sub   { font-size: 12px; color: var(--text2); margin-bottom: 24px; }

    .section-label {
      font-size: 9px; font-weight: 700;
      color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase;
      margin: 20px 0 12px;
    }

    .section-divider { height: 1px; background: var(--border); margin: 20px 0; }

    .field        { margin-bottom: 14px; }
    .field-label  { font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: 1.2px; text-transform: uppercase; display: block; margin-bottom: 7px; }

    .input-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 0 12px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    .input-row svg {
      width: 16px; height: 16px;
      stroke: var(--text3); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
    }

    .input-row input,
    .input-row select {
      flex: 1; border: none; background: transparent;
      padding: 11px 0;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; color: var(--text1); outline: none;
      appearance: none;
    }

    .input-row input::placeholder { color: var(--text3); }

    .invite-box {
      background: var(--accent-light);
      border: 1px solid rgba(29,111,164,0.2);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 14px;
    }

    .invite-box svg {
      width: 16px; height: 16px;
      stroke: var(--accent); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0; margin-top: 1px;
    }

    .invite-box-text {
      font-size: 12px; color: var(--accent); line-height: 1.5;
      font-weight: 500;
    }

    .eye-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center;
    }

    .eye-btn svg {
      width: 15px; height: 15px;
      stroke: var(--text3); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .error-box {
      background: #FEE2E2; border: 1px solid #FECACA;
      color: #991B1B; padding: 11px 14px;
      border-radius: var(--radius-md);
      font-size: 12px; margin-bottom: 16px;
      display: none;
    }

    .error-box.show { display: block; }

    .submit-btn {
      width: 100%; padding: 14px;
      background: var(--primary); color: white;
      border: none; border-radius: var(--radius-md);
      font-family: 'Montserrat', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.15s;
    }

    .submit-btn:hover    { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .submit-btn svg {
      width: 16px; height: 16px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div class="register-wrap">

    <a class="back-link" href="/dashboard/login">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Login
    </a>

    <div class="register-logo">
      <div class="register-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span class="register-app-name">ADUAN AWAM</span>
      <span class="register-tagline">Council Staff Registration</span>
    </div>

    <div class="register-card">
      <div class="register-title">Create Staff Account</div>
      <div class="register-sub">You need a valid invite code from your council administrator</div>

      <div class="error-box" id="err"></div>

      <div class="invite-box">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div class="invite-box-text">This registration is for authorised council staff only. Contact your administrator to obtain an invite code.</div>
      </div>

      <div class="section-label">Personal Details</div>

      <div class="field">
        <label class="field-label">Full Name</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="full_name" placeholder="As per official records" autocomplete="name" />
        </div>
      </div>

      <div class="field">
        <label class="field-label">Email Address</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="staff@council.gov.my" autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label class="field-label">Phone Number</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <input type="tel" id="phone" placeholder="0123456789" autocomplete="tel" />
        </div>
      </div>

      <div class="field">
        <label class="field-label">Department</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <select id="department">
            <option value="">Loading departments...</option>
          </select>
        </div>
      </div>

      <div class="section-divider"></div>
      <div class="section-label">Account Security</div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password" />
          <button class="eye-btn" id="eye-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Confirm Password</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password" />
        </div>
      </div>

      <div class="section-divider"></div>
      <div class="section-label">Invite Code</div>

      <div class="field">
        <label class="field-label">Council Invite Code</label>
        <div class="input-row">
          <svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          <input type="text" id="invite_code" placeholder="Enter your invite code" autocomplete="off" />
        </div>
      </div>

      <button class="submit-btn" id="register-btn">
        <span id="btn-label">Create Account</span>
        <svg viewBox="0 0 24 24" id="btn-arrow"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    if (getToken()) window.location.href = '/dashboard';

    // Load departments
    async function loadDepts() {
      try {
        const res  = await fetch('/api/departments');
        const data = await res.json();
        const sel  = document.getElementById('department');
        if (!data || data.error) {
          sel.innerHTML = '<option value="">Failed to load</option>';
          return;
        }
        sel.innerHTML = '<option value="">Select your department</option>' +
          data.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
      } catch (e) {
        console.error('Failed to load departments:', e);
        document.getElementById('department').innerHTML = '<option value="">Failed to load</option>';
      }
    }

    loadDepts();

    // Password toggle
    const pwdInput = document.getElementById('password');
    document.getElementById('eye-btn').addEventListener('click', () => {
      pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
    });

    // Register
    document.getElementById('register-btn').addEventListener('click', async () => {
      const full_name     = document.getElementById('full_name').value.trim();
      const email         = document.getElementById('email').value.trim();
      const phone         = document.getElementById('phone').value.trim();
      const department_id = document.getElementById('department').value;
      const password      = document.getElementById('password').value;
      const confirm       = document.getElementById('confirm').value;
      const invite_code   = document.getElementById('invite_code').value.trim();
      const err           = document.getElementById('err');
      const btn           = document.getElementById('register-btn');
      const label         = document.getElementById('btn-label');
      const arrow         = document.getElementById('btn-arrow');

      err.classList.remove('show');

      if (!full_name || !email || !department_id || !password || !invite_code) {
        err.textContent = 'Please fill in all required fields.';
        err.classList.add('show'); return;
      }
      if (password.length < 8) {
        err.textContent = 'Password must be at least 8 characters.';
        err.classList.add('show'); return;
      }
      if (password !== confirm) {
        err.textContent = 'Passwords do not match.';
        err.classList.add('show'); return;
      }

      btn.disabled = true;
      label.textContent = 'Creating account...';
      arrow.style.display = 'none';

      const data = await api('/api/staff/register', {
        method: 'POST',
        body:   JSON.stringify({ full_name, email, phone, department_id: parseInt(department_id), password, invite_code }),
      });

      if (!data || data.error) {
        err.textContent = data?.error ?? 'Registration failed. Please try again.';
        err.classList.add('show');
        btn.disabled = false;
        label.textContent = 'Create Account';
        arrow.style.display = '';
        return;
      }

      setAuth(data.token, data.staff);
      window.location.href = '/dashboard';
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('register-btn').click();
    });
  </script>
</body>
</html>
